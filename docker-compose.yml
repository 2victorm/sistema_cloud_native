version: '3.8'

services:

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - app-network

  app:
    image: 1victorm/sistema_cloud_native:latest
    container_name: sistema-guias
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      RABBITMQ_HOST: rabbitmq
      SPRING_AMQP_DESERIALIZATION_TRUST_ALL: "true"
    depends_on:
      - rabbitmq
    networks:
      - app-network

  frontend:
    image: nginx:alpine
    container_name: frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
