<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Plataforma de Cursos</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;background:#f0f2f5}header{background:#0078d4;color:white;padding:16px 32px;display:flex;justify-content:space-between;align-items:center}.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:14px}.btn-primary{background:#0078d4;color:white}.btn-secondary{background:white;color:#0078d4;border:1px solid #0078d4}.btn-success{background:#107c10;color:white}.container{max-width:900px;margin:32px auto;padding:0 16px}.card{background:white;border-radius:8px;padding:24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}.login-box{text-align:center;padding:48px}.hidden{display:none}.tabs{display:flex;gap:8px;margin-bottom:20px}.tab{padding:8px 20px;border-radius:6px;cursor:pointer;font-size:14px;border:1px solid #ddd;background:white}.tab.active{background:#0078d4;color:white}.tab-content{display:none}.tab-content.active{display:block}table{width:100%;border-collapse:collapse;font-size:14px}th{background:#f5f5f5;padding:10px 12px;text-align:left;border-bottom:2px solid #ddd}td{padding:10px 12px;border-bottom:1px solid #eee}.form-group{margin-bottom:16px}.form-group label{display:block;font-size:13px;font-weight:bold;margin-bottom:6px}.form-group input{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}.alert{padding:12px 16px;border-radius:6px;margin-bottom:16px}.alert-success{background:#dff6dd;color:#107c10}.alert-error{background:#fde7e9;color:#d13438}.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.loading{text-align:center;color:#888;padding:24px}.role-tag{background:#e0f0ff;color:#0078d4;padding:2px 8px;border-radius:4px;font-size:12px}.user-info{font-size:13px;display:flex;align-items:center;gap:12px}.mensaje-item{background:#f9f9f9;border-left:4px solid #0078d4;padding:12px;margin-bottom:8px;border-radius:0 6px 6px 0}
  </style>
</head>
<body>
<header>
  <h1>🎓 Plataforma de Cursos en Línea</h1>
  <div id="user-info" class="user-info hidden">
    <span id="user-name"></span>
    <span id="user-role" class="role-tag"></span>
    <button class="btn btn-secondary" onclick="doLogout()">Cerrar sesión</button>
  </div>
</header>
<div class="container">
  <div id="login-section" class="card login-box">
    <h2 style="color:#0078d4;margin-bottom:12px">Bienvenido</h2>
    <p style="color:#666;margin-bottom:24px">Inicia sesión con tu cuenta institucional.</p>
    <button class="btn btn-primary" style="font-size:16px;padding:12px 32px" onclick="doLogin()">Iniciar sesión con Azure AD B2C</button>
  </div>
  <div id="app-section" class="hidden">
    <div id="alert-box" class="hidden"></div>
    <div class="tabs">
      <div class="tab active" onclick="showTab('inscripciones')">Inscripciones</div>
      <div class="tab" onclick="showTab('nueva')">Nueva inscripción</div>
      <div class="tab" onclick="showTab('mensajes')">Cola de mensajes</div>
    </div>
    <div id="tab-inscripciones" class="tab-content active card">
      <div class="section-header"><h2>Inscripciones</h2><button class="btn btn-primary" onclick="cargarInscripciones()">↻ Actualizar</button></div>
      <div id="tabla-inscripciones"><div class="loading">Cargando...</div></div>
    </div>
    <div id="tab-nueva" class="tab-content card">
      <h2 style="margin-bottom:20px">Nueva inscripción</h2>
      <div class="form-row">
        <div class="form-group"><label>Código</label><input id="f-codigo" placeholder="INS-2024-010"/></div>
        <div class="form-group"><label>Estudiante</label><input id="f-estudiante" placeholder="Juan Pérez"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Email</label><input id="f-email" type="email" placeholder="juan@duoc.cl"/></div>
        <div class="form-group"><label>Curso</label><input id="f-curso" placeholder="Desarrollo Cloud Native"/></div>
      </div>
      <div class="form-group"><label>Instructor</label><input id="f-instructor" placeholder="Ignacio Pastenet"/></div>
      <button class="btn btn-success" style="margin-top:8px" onclick="crearInscripcion()">Crear inscripción</button>
    </div>
    <div id="tab-mensajes" class="tab-content card">
      <div class="section-header"><h2>Mensajes de la cola</h2><button class="btn btn-primary" onclick="cargarMensajes()">↻ Actualizar</button></div>
      <div id="lista-mensajes"><div class="loading">Cargando...</div></div>
    </div>
  </div>
</div>
<script src="/msal.js"></script>
<script>
var API="https://gx40xrdtdf.execute-api.us-east-1.amazonaws.com/prod";
var token=null;
var msal_app=null;
var AUTHORITY="https://duocazure6.b2clogin.com/tfp/f46d4161-d548-45fa-b47b-4644faa51b29/b2c_1_signupsignin";

window.onload=function(){
  msal_app=new msal.PublicClientApplication({
    auth:{
      clientId:"5eb7f163-c2ed-4eeb-ba31-b1bfd0c13325",
      authority:AUTHORITY,
      knownAuthorities:["duocazure6.b2clogin.com"],
      redirectUri:"http://localhost:8000"
    }
  });
  msal_app.handleRedirectPromise().then(function(r){
    if(r&&r.idToken){
      token=r.idToken;
      mostrarApp(r);
    } else {
      var accounts=msal_app.getAllAccounts();
      if(accounts.length>0){
        msal_app.acquireTokenSilent({account:accounts[0],scopes:["openid","profile"],authority:AUTHORITY}).then(function(s){
          token=s.idToken;
          mostrarApp(s);
        }).catch(function(e){console.log("silent fail",e);});
      }
    }
  }).catch(function(e){console.error("redirect error",e);});
};

function doLogin(){
  msal_app.loginRedirect({scopes:["openid","profile"],authority:AUTHORITY});
}

function doLogout(){
  msal_app.logoutRedirect();
}

function showTab(name){
  document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active");});
  document.querySelectorAll(".tab-content").forEach(function(c){c.classList.remove("active");});
  event.target.classList.add("active");
  document.getElementById("tab-"+name).classList.add("active");
  if(name==="mensajes") cargarMensajes();
}

function mostrarApp(r){
  var c=r.idTokenClaims||{};
  document.getElementById("login-section").classList.add("hidden");
  document.getElementById("app-section").classList.remove("hidden");
  document.getElementById("user-info").classList.remove("hidden");
  document.getElementById("user-name").textContent=c.name||c.given_name||"Usuario";
  document.getElementById("user-role").textContent=c.extension_rol||"ADMIN";
  cargarInscripciones();
}

function showAlert(m,t){
  var b=document.getElementById("alert-box");
  b.className="alert alert-"+t;
  b.textContent=m;
  b.classList.remove("hidden");
  setTimeout(function(){b.classList.add("hidden");},4000);
}

function cargarInscripciones(){
  document.getElementById("tabla-inscripciones").innerHTML='<div class="loading">Cargando...</div>';
  fetch(API+"/inscripciones/listar",{headers:{"Authorization":"Bearer "+token}})
  .then(function(r){return r.json();})
  .then(function(d){
    if(!d.length){document.getElementById("tabla-inscripciones").innerHTML="<p>No hay inscripciones.</p>";return;}
    var h="<table><thead><tr><th>Código</th><th>Estudiante</th><th>Curso</th><th>Instructor</th><th>Estado</th><th>Fecha</th></tr></thead><tbody>";
    d.forEach(function(i){h+="<tr><td>"+i.codigoInscripcion+"</td><td>"+i.nombreEstudiante+"</td><td>"+i.nombreCurso+"</td><td>"+i.instructor+"</td><td>"+i.estado+"</td><td>"+i.fechaInscripcion+"</td></tr>";});
    h+="</tbody></table>";
    document.getElementById("tabla-inscripciones").innerHTML=h;
  }).catch(function(){document.getElementById("tabla-inscripciones").innerHTML="<p style='color:red'>Error.</p>";});
}

function crearInscripcion(){
  var b={codigoInscripcion:document.getElementById("f-codigo").value,nombreEstudiante:document.getElementById("f-estudiante").value,emailEstudiante:document.getElementById("f-email").value,nombreCurso:document.getElementById("f-curso").value,instructor:document.getElementById("f-instructor").value};
  if(!b.codigoInscripcion||!b.nombreEstudiante||!b.nombreCurso){showAlert("Completa todos los campos.","error");return;}
  fetch(API+"/bff/publicar",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:JSON.stringify(b)})
  .then(function(r){
    if(r.ok){showAlert("Inscripción creada.","success");document.querySelectorAll("#tab-nueva input").forEach(function(i){i.value="";});}
    else{showAlert("Error al crear.","error");}
  }).catch(function(){showAlert("Error de conexión.","error");});
}

function cargarMensajes(){
  document.getElementById("lista-mensajes").innerHTML='<div class="loading">Cargando...</div>';
  fetch(API+"/bff/mensajes",{headers:{"Authorization":"Bearer "+token}})
  .then(function(r){return r.json();})
  .then(function(d){
    if(!d.length){document.getElementById("lista-mensajes").innerHTML="<p>No hay mensajes.</p>";return;}
    var h="";
    d.forEach(function(m){h+='<div class="mensaje-item"><strong>'+m.codigoInscripcion+' — '+m.nombreEstudiante+'</strong><br>Curso: '+m.nombreCurso+'</div>';});
    document.getElementById("lista-mensajes").innerHTML=h;
  }).catch(function(){document.getElementById("lista-mensajes").innerHTML="<p style='color:red'>Error.</p>";});
}
</script>
</body>
</html>
