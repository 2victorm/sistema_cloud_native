spring.application.name=sistema_cloud_native

server.port=8080

# Oracle Cloud
spring.datasource.url=${ORACLE_JDBC_URL}
spring.datasource.username=${ORACLE_USER}
spring.datasource.password=${ORACLE_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# AWS S3
aws.accessKey=${AWS_ACCESS_KEY_ID}
aws.secretKey=${AWS_SECRET_ACCESS_KEY}
aws.sessionToken=${AWS_SESSION_TOKEN}
aws.region=${AWS_REGION}
aws.bucketName=${AWS_BUCKET_NAME}

# Azure AD B2C
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://duocazure6.b2clogin.com/tfp/f46d4161-d548-45fa-b47b-4644faa51b29/b2c_1_signupsignin/v2.0/